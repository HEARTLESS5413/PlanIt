<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanIt — Your Day, Organized</title>
  <meta name="description" content="A beautiful to-do list and day planner with reminders. Plan your day, stay productive." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ============ AUTH PAGE ============ -->
  <div id="auth-page" class="page active">
    <div class="auth-container">
      <div class="auth-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#brandGrad)" />
            <path d="M15 24L21 30L33 18" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="brandGrad" x1="4" y1="4" x2="44" y2="44">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="brand-title">PlanIt</h1>
        <p class="brand-subtitle">Your Day, Organized</p>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form active">
        <h2>Welcome Back</h2>
        <p class="auth-desc">Sign in to access your tasks</p>
        <div id="login-error" class="error-msg hidden"></div>
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="password-toggle" tabindex="-1" title="Show password">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button id="login-btn" class="btn-primary">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-register">Create one</a></p>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form">
        <h2>Create Account</h2>
        <p class="auth-desc">Start planning your days</p>
        <div id="register-error" class="error-msg hidden"></div>
        <div class="input-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" placeholder="John Doe" autocomplete="name" />
        </div>
        <div class="input-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="register-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="register-password" placeholder="Enter your password" autocomplete="new-password" />
            <button type="button" class="password-toggle" tabindex="-1" title="Show password">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button id="register-btn" class="btn-primary">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign in</a></p>
      </div>
    </div>

    <!-- Decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ============ APP PAGE ============ -->
  <div id="app-page" class="page">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <svg viewBox="0 0 48 48" fill="none" width="32" height="32">
          <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#sbGrad)" />
          <path d="M15 24L21 30L33 18" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sbGrad" x1="4" y1="4" x2="44" y2="44">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
        <span>PlanIt</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="today">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Today</span>
        </button>
        <button class="nav-item" data-view="calendar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Calendar</span>
        </button>
        <button class="nav-item" data-view="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span>All Tasks</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-btn" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span class="theme-label">Dark Mode</span>
        </button>
        <button id="logout-btn" class="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <button id="menu-toggle" class="menu-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 id="greeting" class="greeting">Good evening</h1>
            <p id="date-display" class="date-display"></p>
          </div>
        </div>
        <div class="header-right">
          <div class="stats-pill" id="stats-pill">
            <span id="stats-done">0</span>/<span id="stats-total">0</span> done
          </div>
        </div>
      </header>

      <!-- Date Picker Bar -->
      <div id="date-bar" class="date-bar">
        <button id="date-prev" class="date-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="date-list" class="date-list"></div>
        <button id="date-next" class="date-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- Add Task -->
      <div id="add-task-section" class="add-task-section">
        <button id="add-task-btn" class="add-task-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Add a task</span>
        </button>

        <div id="add-task-form" class="add-task-form hidden">
          <input type="text" id="task-title" placeholder="What do you need to do?" class="task-title-input" />
          <textarea id="task-desc" placeholder="Add a description (optional)" class="task-desc-input" rows="2"></textarea>
          <div class="task-form-row">
            <div class="input-group-sm">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Time
              </label>
              <input type="time" id="task-time" />
            </div>
            <div class="input-group-sm">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                Priority
              </label>
              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="input-group-sm">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Date
              </label>
              <input type="date" id="task-date" />
            </div>
          </div>
          <div class="task-form-actions">
            <button id="cancel-task-btn" class="btn-ghost">Cancel</button>
            <button id="save-task-btn" class="btn-primary btn-sm">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Task
            </button>
          </div>
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list"></div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <svg viewBox="0 0 120 120" fill="none" width="120" height="120">
          <circle cx="60" cy="60" r="50" fill="var(--empty-bg)" />
          <path d="M40 60L53 73L80 46" stroke="var(--primary)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
          <rect x="35" y="40" width="50" height="6" rx="3" fill="var(--empty-line)" />
          <rect x="35" y="52" width="35" height="6" rx="3" fill="var(--empty-line)" />
          <rect x="35" y="64" width="42" height="6" rx="3" fill="var(--empty-line)" />
          <rect x="35" y="76" width="28" height="6" rx="3" fill="var(--empty-line)" />
        </svg>
        <h3>No tasks yet</h3>
        <p>Add your first task to start planning your day!</p>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Task</h3>
        <button id="close-modal" class="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-task-id" />
        <div class="input-group">
          <label for="edit-title">Title</label>
          <input type="text" id="edit-title" />
        </div>
        <div class="input-group">
          <label for="edit-desc">Description</label>
          <textarea id="edit-desc" rows="3"></textarea>
        </div>
        <div class="task-form-row">
          <div class="input-group-sm">
            <label>Time</label>
            <input type="time" id="edit-time" />
          </div>
          <div class="input-group-sm">
            <label>Priority</label>
            <select id="edit-priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="input-group-sm">
            <label>Date</label>
            <input type="date" id="edit-date" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="delete-task-btn" class="btn-danger">Delete</button>
        <button id="update-task-btn" class="btn-primary btn-sm">Save Changes</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
